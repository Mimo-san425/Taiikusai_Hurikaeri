<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>体育祭の感想（えらぶだけ）</title>

<style>

body{
  font-family:
  "UD デジタル 教科書体 N-R",
  "Hiragino Sans",
  "Noto Sans JP",
  sans-serif;

  background:#fafafa;
  margin:0;
  padding:20px;
}

.sheet{
  max-width:900px;
  margin:auto;
  background:#fff;
  border:1px solid #ccc;
  border-radius:16px;
  padding:20px;
}

h1{
  margin-top:0;
}

.step{
  border:1px solid #ddd;
  border-radius:14px;
  padding:15px;
  margin-bottom:18px;
}

ruby{
  ruby-position:over;
}

ruby rt{
  font-size:0.85em;
  color:#111;
  font-weight:600;
}

.radio-group{
  display:grid;
  gap:10px;
}

.radio{
  display:flex;
  align-items:flex-start;
  gap:10px;

  padding:12px;

  border:1px solid #ccc;
  border-radius:12px;

  background:#fff;

  cursor:pointer;

  transition:0.15s;
}

.radio:hover{
  background:#f7f7f7;
}

.radio input{
  transform:scale(1.3);
  margin-top:3px;
}

.radio:has(input:checked){
  border-color:#2563eb;
  background:#eff6ff;
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
  transform:scale(1.02);
}

button{
  padding:14px 20px;
  font-size:18px;
  border-radius:10px;
  border:1px solid #aaa;
  background:#f5f5f5;
  cursor:pointer;
}

/* まとめ */

#result{
  width:100%;

  min-height:500px;

  overflow:auto;

  writing-mode:vertical-rl;
  text-orientation:upright;

  line-height:1.9;
  letter-spacing:2px;

  font-size:18px;

  padding:12px;

  border-radius:12px;
  border:1px solid #bbb;

  box-sizing:border-box;

  white-space:pre-wrap;
}

/* まとめのふりがな */

#result ruby rt{
  font-size:0.6em;
  color:#111;
  font-weight:600;
}

.example{
  margin:10px 0;
  color:#666;
}

@media print{

  button{
    display:none;
  }

  .sheet{
    border:none;
  }

  body{
    background:#fff;
  }

  @page{
    margin:10mm;
  }

  #result{
    border:none;
    font-size:20px;
  }

}

</style>
</head>

<body>

<div class="sheet">

<h1>
<ruby>体育祭<rt>たいいくさい</rt></ruby>の
<ruby>感想<rt>かんそう</rt></ruby>
（えらぶだけ）
</h1>

<!-- ① -->

<div class="step">

<h2>
①
<ruby>一番<rt>いちばん</rt></ruby>の
<ruby>思<rt>おも</rt></ruby>い
<ruby>出<rt>で</rt></ruby>
</h2>

<div class="radio-group">

<label class="radio">
<input type="radio" name="event" value="うらじゃ">
<span>うらじゃ</span>
</label>

<label class="radio">
<input type="radio" name="event" value="徒競走">
<span>
<ruby>徒競走<rt>ときょうそう</rt></ruby>
</span>
</label>

<label class="radio">
<input type="radio" name="event" value="学年種目">
<span>
<ruby>学年種目<rt>がくねんしゅもく</rt></ruby>
</span>
</label>

<label class="radio">
<input type="radio" name="event" value="応援">
<span>
<ruby>応援<rt>おうえん</rt></ruby>
</span>
</label>

</div>
</div>

<!-- ② -->

<div class="step">

<h2>② なにをした？</h2>

<div class="radio-group">

<label class="radio">
<input type="radio" name="action"
value="さいごまで走りました。">

<span>
さいごまで
<ruby>走<rt>はし</rt></ruby>りました。
</span>
</label>

<label class="radio">
<input type="radio" name="action"
value="大きな声でおうえんしました。">

<span>
<ruby>大<rt>おお</rt></ruby>きな
<ruby>声<rt>こえ</rt></ruby>で
おうえんしました。
</span>
</label>

<label class="radio">
<input type="radio" name="action"
value="一生懸命に踊りました。">

<span>
<ruby>一生懸命<rt>いっしょうけんめい</rt></ruby>に
<ruby>踊<rt>おど</rt></ruby>りました。
</span>
</label>

<label class="radio">
<input type="radio" name="action"
value="友だちと力を合わせました。">

<span>
<ruby>友<rt>とも</rt></ruby>だちと
<ruby>力<rt>ちから</rt></ruby>を
<ruby>合<rt>あ</rt></ruby>わせました。
</span>
</label>

</div>
</div>

<!-- ③ -->

<div class="step">

<h2>
③
<ruby>結果<rt>けっか</rt></ruby>
</h2>

<div class="radio-group">

<label class="radio">
<input type="radio" name="resultPick"
value="うまくできました。">

<span>うまくできました。</span>
</label>

<label class="radio">
<input type="radio" name="resultPick"
value="きんちょうしたけど、できました。">

<span>
きんちょうしたけど、
できました。
</span>
</label>

<label class="radio">
<input type="radio" name="resultPick"
value="まけたけど、がんばれました。">

<span>
まけたけど、
がんばれました。
</span>
</label>

</div>
</div>

<!-- ④ -->

<div class="step">

<h2>
④
<ruby>気持<rt>きも</rt></ruby>ち
</h2>

<div class="radio-group">

<label class="radio">
<input type="radio" name="feeling"
value="たのしかったです。">

<span>たのしかったです。</span>
</label>

<label class="radio">
<input type="radio" name="feeling"
value="うれしかったです。">

<span>うれしかったです。</span>
</label>

<label class="radio">
<input type="radio" name="feeling"
value="くやしかったです。">

<span>くやしかったです。</span>
</label>

</div>
</div>

<!-- ⑤ -->

<div class="step">

<h2>
⑤
どうして？
</h2>

<div class="radio-group">

<label class="radio">
<input type="radio" name="reason"
value="れんしゅうをがんばったからです。">

<span>
れんしゅうを
がんばったからです。
</span>
</label>

<label class="radio">
<input type="radio" name="reason"
value="友だちと協力できたからです。">

<span>
<ruby>友<rt>とも</rt></ruby>だちと
<ruby>協力<rt>きょうりょく</rt></ruby>
できたからです。
</span>
</label>

<label class="radio">
<input type="radio" name="reason"
value="さいごまであきらめなかったからです。">

<span>
さいごまで
あきらめなかったからです。
</span>
</label>

</div>
</div>

<!-- ⑥ -->

<div class="step">

<h2>
⑥
<ruby>来年<rt>らいねん</rt></ruby>に
むけて
</h2>

<div class="radio-group">

<label class="radio">
<input type="radio" name="next"
value="来年はもっと速く走れるようになりたいです。">

<span>
<ruby>来年<rt>らいねん</rt></ruby>は
もっと
<ruby>速<rt>はや</rt></ruby>く
<ruby>走<rt>はし</rt></ruby>れるように
なりたいです。
</span>
</label>

<label class="radio">
<input type="radio" name="next"
value="来年もみんなと協力したいです。">

<span>
<ruby>来年<rt>らいねん</rt></ruby>も
みんなと
<ruby>協力<rt>きょうりょく</rt></ruby>
したいです。
</span>
</label>

<label class="radio">
<input type="radio" name="next"
value="来年はもっと練習をがんばりたいです。">

<span>
<ruby>来年<rt>らいねん</rt></ruby>は
もっと
れんしゅうを
がんばりたいです。
</span>
</label>

</div>
</div>

<!-- まとめ -->

<div class="step">

<h2>
<ruby>感想<rt>かんそう</rt></ruby>のまとめ
</h2>

<button onclick="window.print()">
PDFにする
</button>

<div class="example">
※えらべるところだけでOK
</div>

<div id="result"></div>

</div>

</div>

<script>

function picked(name){

  const el =
  document.querySelector(
    `input[name="${name}"]:checked`
  );

  return el ? el.value : "";
}

function build(){

  const event =
  picked("event") || "（しゅもく）";

  const action =
  picked("action") || "（したこと）";

  const resultPick =
  picked("resultPick") || "（けっか）";

  const feeling =
  picked("feeling") || "（きもち）";

  const reason =
  picked("reason") || "（りゆう）";

  const next =
  picked("next") || "（らいねんのもくひょう）";

  document.getElementById("result").innerHTML =

`
<ruby>私<rt>わたし</rt></ruby>の<ruby>一番<rt>いちばん</rt></ruby>の<ruby>思<rt>おも</rt></ruby>い<ruby>出<rt>で</rt></ruby>は${event}です。

${action}

${resultPick}

${feeling}

${reason}

${next}
`;

}

/* 自動更新 */

document
.querySelectorAll('input[type="radio"]')
.forEach(r=>{

  r.addEventListener("change", build);

});

/* 最初から表示 */

window.addEventListener("load", build);

</script>

</body>
</html>
